<!-- @dsCard group="Portfolio" viewport="390x760" name="Interactive portfolio" subtitle="Deep home · Full ↔ TL;DR toggle · tap a project for the case study" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pablo Urrutia × Development Seed — Portfolio</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #111; }
  #stage {
    position: relative; width: 100%; max-width: 390px; margin: 0 auto;
    height: 100vh; background: var(--charcoal); overflow: hidden;
  }
  /* layers */
  .layer { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .overlay {
    transform: translateX(100%); transition: transform 320ms cubic-bezier(.22,.61,.36,1);
    will-change: transform; z-index: 5;
  }
  .overlay.open { transform: translateX(0); }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="CaseStudy.jsx"></script>
<script type="text/babel">
  const Shell = window.Shell;
  const CaseStudy = window.CaseStudy;
  function App() {
    const [openId, setOpenId] = React.useState(null);
    const [mounted, setMounted] = React.useState(null); // keeps content during slide-out
    const [mode, setMode] = React.useState('common');    // 'common' | 'grid-aware'
    const D = window.PORTFOLIO_DATA;

    const open = (id) => { setMounted(id); requestAnimationFrame(() => setOpenId(id)); };
    const close = () => { setOpenId(null); setTimeout(() => setMounted(null), 340); };
    const toggleMode = () => setMode((m) => (m === 'common' ? 'grid-aware' : 'common'));

    const caseData = mounted ? D.cases.find((c) => c.id === mounted) : null;

    return (
      <div data-mode={mode === 'grid-aware' ? 'grid-aware' : undefined} style={{ position: 'absolute', inset: 0 }}>
        <div className="layer"><Shell onOpenCase={open} mode={mode} onToggleMode={toggleMode} /></div>
        <div className={'layer overlay' + (openId ? ' open' : '')}>
          {caseData && <CaseStudy data={caseData} mode={mode} onToggleMode={toggleMode} onClose={close} />}
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
